<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ingresar | SAP Web</title>
    <style>
      :root {
        --bg: #171a20; --surface: #1e2228; --panel: #232830; --panel-2: #2a3040;
        --line: rgba(255,255,255,0.07); --text: #e4e8f0; --muted: #8892a4;
        --accent: #7c9cff; --accent-2: #5a7ae0; --bad: #f87171;
      }
      *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { color-scheme: dark; }
      body {
        min-height: 100vh; display: grid; place-items: center;
        background: var(--bg); color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif; font-size: 15px;
      }
      .login-card {
        width: min(380px, 92vw); padding: 28px 30px;
        background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
        box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      }
      .brand-label {
        display: block; font-size: 10px; letter-spacing: 0.16em;
        text-transform: uppercase; color: var(--muted); margin-bottom: 4px;
      }
      h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 22px; }
      .field { display: grid; gap: 5px; margin-bottom: 14px; }
      .field label {
        font-size: 0.78rem; font-weight: 600; color: var(--muted);
        text-transform: uppercase; letter-spacing: 0.05em;
      }
      .field input {
        width: 100%; padding: 10px 12px; border-radius: 9px;
        border: 1px solid var(--line); background: var(--panel-2);
        color: var(--text); font: inherit; font-size: 0.92rem;
      }
      .field input:focus {
        outline: none; border-color: rgba(124,156,255,0.5);
        box-shadow: 0 0 0 3px rgba(124,156,255,0.09);
      }
      .button {
        display: inline-flex; justify-content: center; width: 100%;
        padding: 10px 18px; border: 1px solid transparent; border-radius: 999px;
        background: var(--accent); color: #fff; font: inherit;
        font-size: 0.9rem; font-weight: 600; cursor: pointer;
        transition: background 110ms;
      }
      .button:hover { background: var(--accent-2); }
      .alert {
        padding: 9px 13px; border-radius: 9px; font-size: 0.85rem;
        margin-bottom: 14px; color: var(--bad);
        background: rgba(248,113,113,0.07); border: 1px solid rgba(248,113,113,0.16);
      }
    </style>
  </head>
  <body>
    <form class="login-card" method="post">
      <h1>Ingresar</h1>

      {% if error %}<div class="alert">{{ error }}</div>{% endif %}

      <div class="field">
        <label for="username">Usuario</label>
        <input id="username" name="username" type="text" autofocus required value="{{ username or '' }}">
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" required>
      </div>
      <input type="hidden" name="next" value="{{ next_url or '' }}">
      <button class="button" type="submit">Entrar</button>
    </form>
  </body>
</html>
