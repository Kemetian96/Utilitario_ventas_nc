<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}SAP Web{% endblock %}</title>
    <style>
      :root {
        --bg:          #171a20;
        --surface:     #1e2228;
        --panel:       #232830;
        --panel-2:     #2a3040;
        --line:        rgba(255, 255, 255, 0.07);
        --line-strong: rgba(124, 156, 255, 0.22);
        --text:        #e4e8f0;
        --muted:       #8892a4;
        --accent:      #7c9cff;
        --accent-2:    #5a7ae0;
        --ok:          #4ade80;
        --warn:        #fbbf24;
        --bad:         #f87171;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { color-scheme: dark; }

      body {
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif;
        font-size: 15px;
        line-height: 1.5;
      }

      a { color: inherit; text-decoration: none; }

      /* ── LAYOUT ── */
      .app-shell {
        display: grid;
        grid-template-columns: 230px minmax(0, 1fr);
        min-height: 100vh;
      }

      /* ── SIDEBAR ── */
      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 18px 12px;
        background: var(--surface);
        border-right: 1px solid var(--line);
        overflow-y: auto;
      }

      .brand {
        padding: 10px 12px 14px;
        margin-bottom: 10px;
        border-bottom: 1px solid var(--line);
      }

      .brand-label {
        display: block;
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 3px;
      }

      .brand h1 { font-size: 1.05rem; font-weight: 600; letter-spacing: -0.02em; }

      .nav { display: flex; flex-direction: column; gap: 3px; }

      .nav a {
        display: flex;
        flex-direction: column;
        padding: 9px 12px;
        border-radius: 10px;
        border: 1px solid transparent;
        transition: background 110ms, border-color 110ms;
      }

      .nav a:hover { background: rgba(255,255,255,0.04); border-color: var(--line); }
      .nav a.active { background: rgba(124,156,255,0.09); border-color: rgba(124,156,255,0.28); }
      .nav a strong { font-size: 0.88rem; font-weight: 600; }
      .nav a span   { font-size: 0.76rem; color: var(--muted); margin-top: 2px; }

      /* ── WORKSPACE ── */
      .workspace { display: flex; flex-direction: column; min-height: 100vh; }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 24px;
        background: var(--surface);
        border-bottom: 1px solid var(--line);
      }

      .topbar-title { font-size: 0.92rem; font-weight: 600; letter-spacing: -0.01em; }

      /* ── STATUS CHIPS ── */
      .topbar-status { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

      .status-chip {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 5px 8px 5px 11px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        font-size: 0.78rem;
        color: var(--muted);
        position: relative;
      }

      .chip-label { font-weight: 500; white-space: nowrap; }

      /* dots (DB) */
      .dot-group { display: flex; gap: 5px; align-items: center; }

      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--muted);
        transition: background 250ms;
        cursor: default;
      }

      .dot.pulse { animation: blink 1.1s ease-in-out infinite; }
      .dot.ok    { background: var(--ok); }
      .dot.err   { background: var(--bad); }

      @keyframes blink { 0%,100% { opacity: .35; } 50% { opacity: 1; } }

      /* hilos value */
      .chip-value {
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        color: var(--text);
        min-width: 14px;
        text-align: center;
      }

      .chip-value.ok   { color: var(--ok); }
      .chip-value.warn { color: var(--warn); }
      .chip-value.err  { color: var(--bad); }

      /* hilos chip: pointer on hover to indicate clickable */
      .hilos-chip { cursor: pointer; user-select: none; }

      /* ── HILOS POPUP ── */
      .hilos-popup {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        z-index: 200;
        min-width: 210px;
        background: var(--panel);
        border: 1px solid var(--line-strong);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 36px rgba(0,0,0,0.45);
      }

      .hilos-popup[hidden] { display: none; }

      .hilos-popup table { width: 100%; border-collapse: collapse; }

      .hilos-popup th {
        padding: 7px 12px;
        background: rgba(255,255,255,0.03);
        color: var(--muted);
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        font-weight: 600;
        text-align: left;
        border-bottom: 1px solid var(--line);
      }

      .hilos-popup td {
        padding: 7px 12px;
        font-size: 0.83rem;
        color: var(--text);
        border-bottom: 1px solid rgba(255,255,255,0.04);
      }

      .hilos-popup tr:last-child td { border-bottom: none; }

      .hilos-popup td:last-child {
        text-align: right;
        font-variant-numeric: tabular-nums;
        color: var(--warn);
        font-weight: 600;
      }

      .hilos-popup .popup-empty {
        padding: 10px 12px;
        font-size: 0.82rem;
        color: var(--muted);
        text-align: center;
      }

      .hilos-popup .popup-error {
        padding: 10px 12px;
        font-size: 0.78rem;
        color: var(--bad);
        line-height: 1.4;
      }

      /* ── REFRESH BUTTON ── */
      .refresh-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        border: none;
        border-radius: 50%;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        padding: 0;
        flex-shrink: 0;
        transition: color 110ms, background 110ms;
      }

      .refresh-btn:hover { color: var(--text); background: rgba(255,255,255,0.08); }
      .refresh-btn.spinning svg { animation: spin 0.75s linear infinite; }

      /* ── WORKSPACE BODY ── */
      .workspace-body { padding: 22px 26px; flex: 1; }
      .content { display: grid; gap: 14px; max-width: 860px; }

      /* ── PANELS ── */
      .panel { padding: 20px 22px; border: 1px solid var(--line); border-radius: 14px; background: var(--surface); }

      .section-label {
        display: block;
        font-size: 0.73rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 14px;
      }

      /* ── FORMS ── */
      .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; }
      .field { display: grid; gap: 5px; }

      .field label {
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .field input,
      .field select {
        width: 100%;
        padding: 9px 11px;
        border-radius: 9px;
        border: 1px solid var(--line);
        background: var(--panel-2);
        color: var(--text);
        font: inherit;
        font-size: 0.9rem;
      }

      .field input:focus,
      .field select:focus {
        outline: none;
        border-color: rgba(124,156,255,0.5);
        box-shadow: 0 0 0 3px rgba(124,156,255,0.09);
      }

      .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }

      .button {
        display: inline-flex;
        align-items: center;
        padding: 8px 18px;
        border: 1px solid transparent;
        border-radius: 999px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-size: 0.86rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 110ms, transform 100ms;
      }

      .button:hover { background: var(--accent-2); transform: translateY(-1px); }

      .button.ghost {
        background: transparent;
        border-color: var(--line);
        color: var(--muted);
      }

      .button.ghost:hover { background: rgba(255,255,255,0.04); color: var(--text); transform: none; }

      /* ── SUMMARY CARDS ── */
      .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-top: 12px; }

      .summary-card { padding: 12px 14px; border: 1px solid var(--line); border-radius: 11px; background: var(--panel); }
      .summary-card span   { display: block; font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
      .summary-card strong { display: block; font-size: 1.5rem; font-weight: 600; margin-top: 5px; font-variant-numeric: tabular-nums; }

      /* ── ALERTS ── */
      .alert { padding: 9px 13px; border-radius: 9px; border: 1px solid transparent; font-size: 0.86rem; margin-top: 10px; }
      .alert.ok    { color: var(--ok);  background: rgba(74,222,128,0.07);   border-color: rgba(74,222,128,0.16); }
      .alert.error { color: var(--bad); background: rgba(248,113,113,0.07);  border-color: rgba(248,113,113,0.16); }

      /* ── TABLE ── */
      .table-wrap { overflow-x: auto; margin-top: 12px; border: 1px solid var(--line); border-radius: 11px; }
      table { width: 100%; border-collapse: collapse; }

      th, td { padding: 9px 13px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: left; white-space: nowrap; font-size: 0.86rem; }

      th { background: rgba(255,255,255,0.03); color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
      tr:last-child td { border-bottom: none; }

      .state-pill { display: inline-flex; padding: 3px 8px; border-radius: 999px; font-size: 0.73rem; font-weight: 700; }
      .state-pill.bad  { background: rgba(248,113,113,0.12); color: var(--bad); }
      .state-pill.warn { background: rgba(251,191,36,0.12);  color: var(--warn); }

      /* ── LINKS ── */
      .links-list { display: grid; gap: 7px; margin-top: 12px; }
      .links-list a { color: #b8c8ff; font-size: 0.85rem; word-break: break-all; }
      .links-list a:hover { text-decoration: underline; }

      .button-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

      /* ── LOADING OVERLAY ── */
      .loading-overlay {
        position: fixed; inset: 0; display: none;
        align-items: center; justify-content: center;
        background: rgba(10,12,18,0.72); backdrop-filter: blur(5px); z-index: 1000;
      }
      .loading-overlay.visible { display: flex; }

      .loading-card { min-width: 230px; padding: 24px 22px; border-radius: 16px; border: 1px solid var(--line); background: var(--surface); text-align: center; }

      .spinner { width: 38px; height: 38px; margin: 0 auto 12px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.07); border-top-color: var(--accent); animation: spin 0.85s linear infinite; }
      .loading-card strong { display: block; font-size: 0.92rem; margin-bottom: 5px; }
      .loading-card span   { color: var(--muted); font-size: 0.83rem; }

      @keyframes spin { to { transform: rotate(360deg); } }

      @media (max-width: 860px) {
        .app-shell { grid-template-columns: 1fr; }
        .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--line); }
        .topbar, .workspace-body { padding-left: 16px; padding-right: 16px; }
      }
    </style>
  </head>
  <body>
    <div class="loading-overlay" id="loading-overlay">
      <div class="loading-card">
        <div class="spinner"></div>
        <strong>Procesando</strong>
        <span id="loading-text">Espera un momento…</span>
      </div>
    </div>

    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-label">SAP Report</span>
          <h1>Web local</h1>
        </div>
        <nav class="nav">
          {% for module in modules if module.sidebar %}
            <a href="{{ module.url }}" class="{% if sidebar_page == module.page %}active{% endif %}">
              <strong>{{ module.title }}</strong>
              <span>{{ module.subtitle }}</span>
            </a>
          {% endfor %}
        </nav>
      </aside>

      <div class="workspace">
        <div class="topbar">
          <span class="topbar-title">{{ current_module.title }}</span>

          <div class="topbar-status">
            {% if usuario %}
              <div class="status-chip" title="Usuario conectado">
                <span class="chip-label">{{ usuario }}</span>
                <a href="/logout" class="refresh-btn" title="Salir" style="text-decoration:none;">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                  </svg>
                </a>
              </div>
            {% endif %}

            <!-- chip: DB conexiones -->
            <div class="status-chip">
              <span class="chip-label">DB</span>
              <div class="dot-group" id="conn-dots">
                <span class="dot" title="SAP"></span>
                <span class="dot" title="PostgreSQL"></span>
                <span class="dot" title="MySQL"></span>
              </div>
              <button class="refresh-btn" id="conn-refresh" title="Actualizar conexiones">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5"/>
                  <path d="M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5"/>
                </svg>
              </button>
            </div>

            <!-- chip: Hilos (click para ver tabla) -->
            <div class="status-chip hilos-chip" id="hilos-chip">
              <span class="chip-label">Hilos</span>
              <span class="chip-value" id="hilos-val">—</span>
              <button class="refresh-btn" id="hilos-refresh" title="Actualizar hilos">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5"/>
                  <path d="M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5"/>
                </svg>
              </button>

              <!-- popup mini-tabla -->
              <div class="hilos-popup" id="hilos-popup" hidden>
                <table>
                  <thead>
                    <tr><th>Hilo</th><th style="text-align:right">Cantidad</th></tr>
                  </thead>
                  <tbody id="hilos-popup-body"></tbody>
                </table>
              </div>
            </div>

          </div>
        </div>

        <div class="workspace-body">
          <main class="content">
            {% block content %}{% endblock %}
          </main>
        </div>
      </div>
    </div>

    <script>
      (function () {
        /* ── loading overlay (only shown after 900ms delay) ── */
        var overlay     = document.getElementById("loading-overlay");
        var loadingText = document.getElementById("loading-text");
        var shown       = false;

        function scheduleLoading(msg) {
          if (shown || !overlay) return;
          setTimeout(function () {
            if (shown) return;
            shown = true;
            loadingText.textContent = msg || "Procesando solicitud…";
            overlay.classList.add("visible");
            document.body.style.cursor = "progress";
          }, 2000);
        }

        document.querySelectorAll("form").forEach(function (f) {
          f.addEventListener("submit", function () { scheduleLoading(f.dataset.loadingText || "Procesando…"); });
        });

        document.querySelectorAll("a[href]").forEach(function (a) {
          a.addEventListener("click", function (e) {
            var href = a.getAttribute("href");
            if (!href || href.startsWith("#") || a.target === "_blank" || a.hasAttribute("download")) return;
            if (e.ctrlKey || e.metaKey || e.shiftKey || e.altKey) return;
            scheduleLoading("Cargando módulo…");
          });
        });

        /* ── refs ── */
        var dots           = document.querySelectorAll("#conn-dots .dot");
        var hilosVal       = document.getElementById("hilos-val");
        var hilosPopup     = document.getElementById("hilos-popup");
        var hilosPopupBody = document.getElementById("hilos-popup-body");
        var dbKeys         = ["sap", "postgres", "mysql"];
        var dbLabels       = ["SAP", "PostgreSQL", "MySQL"];

        var CACHE_DB    = "sap_db_status";
        var CACHE_HILOS = "sap_hilos";

        /* ── render ── */
        function renderDB(data) {
          dots.forEach(function (dot, i) {
            var val = (data[dbKeys[i]] || "").toString();
            var ok  = val === "OK" || val.toLowerCase().startsWith("ok");
            dot.className = "dot " + (ok ? "ok" : "err");
            dot.title     = dbLabels[i] + ": " + val;
          });
        }

        function renderHilosChip(data) {
          var n = typeof data.count === "number" ? data.count : -1;
          if (n < 0) {
            hilosVal.textContent = "?";
            hilosVal.className   = "chip-value err";
            hilosVal.title       = data.error ? ("Error: " + data.error) : "Error al consultar";
          } else {
            hilosVal.textContent = n;
            hilosVal.className   = "chip-value " + (n === 0 ? "ok" : "warn");
            hilosVal.title       = "";
          }
        }

        function renderHilosPopup(rows, error) {
          hilosPopupBody.innerHTML = "";
          var existing = hilosPopup.querySelector(".popup-empty, .popup-error");
          if (existing) existing.remove();

          if (error) {
            var div = document.createElement("div");
            div.className   = "popup-error";
            div.textContent = error;
            hilosPopup.appendChild(div);
            return;
          }
          if (!rows || rows.length === 0) {
            var div2 = document.createElement("div");
            div2.className   = "popup-empty";
            div2.textContent = "Sin hilos pendientes";
            hilosPopup.appendChild(div2);
            return;
          }
          rows.forEach(function (row) {
            var tr  = document.createElement("tr");
            var td1 = document.createElement("td");
            var td2 = document.createElement("td");
            td1.textContent = row[0];
            td2.textContent = row[1];
            tr.appendChild(td1);
            tr.appendChild(td2);
            hilosPopupBody.appendChild(tr);
          });
        }

        /* ── cache helpers ── */
        function saveCache(key, data) {
          try { sessionStorage.setItem(key, JSON.stringify(data)); } catch (e) {}
        }

        function loadCache(key) {
          try { return JSON.parse(sessionStorage.getItem(key)); } catch (e) { return null; }
        }

        /* ── restore from cache on page load (no fetch) ── */
        var cachedDB = loadCache(CACHE_DB);
        if (cachedDB) renderDB(cachedDB);

        var cachedHilos = loadCache(CACHE_HILOS);
        if (cachedHilos) {
          renderHilosChip(cachedHilos);
          renderHilosPopup(cachedHilos.rows || [], cachedHilos.error || null);
        }

        /* ── fetch helpers ── */
        function setSpinning(btn, on) {
          btn.classList.toggle("spinning", on);
          btn.disabled = on;
        }

        function fetchDB(btn) {
          setSpinning(btn, true);
          fetch("/api/conexiones")
            .then(function (r) { return r.json(); })
            .then(function (data) {
              saveCache(CACHE_DB, data);
              renderDB(data);
            })
            .catch(function () {
              var err = { sap: "Error", postgres: "Error", mysql: "Error" };
              renderDB(err);
            })
            .finally(function () { setSpinning(btn, false); });
        }

        function fetchHilos(btn) {
          setSpinning(btn, true);
          hilosPopup.hidden = true;
          fetch("/api/hilos")
            .then(function (r) { return r.json(); })
            .then(function (data) {
              saveCache(CACHE_HILOS, data);
              renderHilosChip(data);
              renderHilosPopup(data.rows || [], data.error || null);
            })
            .catch(function () {
              var err = { count: -1, error: "Sin respuesta del servidor" };
              renderHilosChip(err);
              renderHilosPopup([], err.error);
            })
            .finally(function () { setSpinning(btn, false); });
        }

        /* ── refresh buttons ── */
        document.getElementById("conn-refresh").addEventListener("click", function (e) {
          e.stopPropagation();
          fetchDB(this);
        });

        document.getElementById("hilos-refresh").addEventListener("click", function (e) {
          e.stopPropagation();
          hilosVal.textContent = "…";
          hilosVal.className   = "chip-value";
          fetchHilos(this);
        });

        /* ── hilos popup toggle (click en el chip, no en el botón) ── */
        document.getElementById("hilos-chip").addEventListener("click", function (e) {
          if (e.target.closest("#hilos-refresh")) return;
          var hasContent = hilosPopupBody.children.length > 0
            || hilosPopup.querySelector(".popup-empty")
            || hilosPopup.querySelector(".popup-error");
          if (!hasContent) return;
          hilosPopup.hidden = !hilosPopup.hidden;
        });

        document.addEventListener("click", function (e) {
          if (!document.getElementById("hilos-chip").contains(e.target)) {
            hilosPopup.hidden = true;
          }
        });

      })();
    </script>
  </body>
</html>
