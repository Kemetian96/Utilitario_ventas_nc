{% extends "base.html" %}

{% block title %}Conexiones | SAP Web{% endblock %}

{% block content %}
  <section class="panel">
    <form method="post">
      <div class="actions">
        <button class="button" type="submit">Probar conexiones</button>
      </div>
    </form>

    {% if error %}
      <div class="alert error">{{ error }}</div>
    {% endif %}
  </section>

  {% if result %}
    <section class="panel">
      <span class="section-label">Resultado</span>
      <div class="summary-grid">
        <div class="summary-card">
          <span>SAP</span>
          <strong>{{ result.sap }}</strong>
        </div>
        <div class="summary-card">
          <span>PostgreSQL</span>
          <strong>{{ result.postgres }}</strong>
        </div>
        <div class="summary-card">
          <span>MySQL</span>
          <strong>{{ result.mysql }}</strong>
        </div>
      </div>
    </section>
  {% endif %}
{% endblock %}
